name: Upload Release Artifacts

on:
  push:
    tags: [ '*' ]

env:
  BUILD_NUMBER: ${{ github.run_number }}
  JAVA_VERSION: 21
  MAVEN_UPLOAD_URL: ${{ secrets.MAVEN_UPLOAD_URL }}
  MAVEN_UPLOAD_USERNAME: ${{ secrets.MAVEN_UPLOAD_USERNAME }}
  MAVEN_UPLOAD_PASSWORD: ${{ secrets.MAVEN_UPLOAD_PASSWORD }}
  TAG: ${{ github.ref_name }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest commit.
        uses: actions/checkout@v4

      - name: Get time of build
        uses: srfrnk/current-time@master
        id: current-time
        with:
          format: YYYYMMDDHHmmss

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'microsoft'

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        env:
          BUILD_TIME: ${{ steps.current-time.outputs.formattedTime }}
        run: ./gradlew assemble

      - name: Maven Release
        if: ${{ env.MAVEN_UPLOAD_URL }}
        run: ./gradlew publish

      - name: Publish (GitHub Releases)
        id: publish_github
        uses: Kira-NT/mc-publish@v3.3
        with:
          github-token: ${{ github.token }}
          version: ${{ env.TAG }}
          files: \**/build/libs/*-@(sources|javadoc).jar

      - name: Publish (NeoForge)
        id: publish_neoforge
        uses: Kira-NT/mc-publish@v3.3
        with:
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          version: ${{ env.TAG }}+neoforge
          files: neoforge/build/libs/*-@(sources|javadoc).jar

      - name: Publish (Fabric)
        id: publish_fabric
        uses: Kira-NT/mc-publish@v3.3
        with:
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          version: ${{ env.TAG }}+fabric
          files: fabric/build/libs/*.jar

      - name: Post to BlueSky
        uses: myConsciousness/bluesky-post@v5
        with:
          text: |
            It's time for a mysterious update...
            Updates have been released for Mysterious Biomes via [CurseForge](https://mods.cf/280003) and [Modrinth](https://modrinth.com/mod/mysterious-biomes)!

            Check out my other mods here https://tophatcat.dev and remember to report bugs when you find them or I won't know to fix them!
          tags: "modding,minecraft,mods"
          retry-count: 5
          identifier: ${{ secrets.BLUESKY_IDENTIFIER }}
          password: ${{ secrets.BLUESKY_PASSWORD }}

      - name: Post to Discord
        uses: Up-Mods/action-discord-release@main
        with:
          version: ${{ env.TAG }}
          webhook-username: "Mod Update News"
          ping-notification-role: false
          webhook-avatar-url: https://raw.githubusercontent.com/kiris-mods/mysterious-biomes/refs/heads/devs/common/src/main/resources/logo.png
          webhook-url: ${{ secrets.ANNOUNCEMENT_WEBHOOK_URL }}
          curseforge-project-id: ${{ steps.publish_fabric.outputs.curseforge-id }}
          modrinth-project-id: ${{ steps.publish_fabric.outputs.modrinth-id }}
          thumbnail-url: https://raw.githubusercontent.com/kiris-mods/mysterious-biomes/refs/heads/dev/common/src/main/resources/logo.png
